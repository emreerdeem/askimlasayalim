<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Alkolsüz Bir Yaşam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg"></div>
<div class="overlay"></div>

<main class="container">
<div class="logo">♡</div>
<h1>Alkolsüz Bir Yaşam</h1>
<p class="sub">Her geçen saniye, daha iyi bir sen.</p>

<div class="badge">📅 16 Temmuz 2026'dan itibaren</div>

<section class="glass">
<h3>ALKOLSÜZ GEÇEN SÜRE</h3>
<div id="counter">00 Gün : 00 Saat : 00 Dakika : 00 Saniye</div>
</section>

<section class="glass">
<p class="quote">“Bugün vazgeçtiğin bir şey, yarın kazandığın her şey olacak.”</p>
</section>

<div class="stats">
<div class="glass stat"><span>❤️</span><b>0</b><small>İçki İçmedi</small></div>
<div class="glass stat"><span>💰</span><b>₺0</b><small>Tasarruf</small></div>
<div class="glass stat"><span>🌿</span><b>0</b><small>Sağlıklı Gün</small></div>
<div class="glass stat"><span>⭐</span><b>0</b><small>Rozet</small></div>
</div>
</main>

<script src="script.js"></script>
</body>
</html>
